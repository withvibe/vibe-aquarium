services:
  aquarium:
    build: .
    container_name: ${CLIENT_ID:-vibe-aquarium}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/aquarium.db
    volumes:
      - aquarium-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/state',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  aquarium-data:
